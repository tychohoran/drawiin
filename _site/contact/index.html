<div id="wrapper">

    <div id="language_select">
        <a href="?language=english" id="english_button">en</a> / <a href="?language=derja" id="derja_button">تو</a>

	<main id="site_main_derja">

	<footer id="site_footer">

</footer>
</div>
<script>

    window.onload = function() {
        parseLanguage();
    };

    function openMenu() {
        document.getElementById('menu').classList.toggle('active');
    }

    function parseLanguage() {
        var site_lang = "english";
        var queryString = window.location.search;
        var urlParams = new URLSearchParams(queryString);
        var language = urlParams.get('language');
        if(language){
            site_lang = language;
        }
        document.getElementById('wrapper').classList.add(language);
    }
</script>
</body>
